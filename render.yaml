services:
  - type: web
    name: hr-system
    env: docker
    plan: free

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: hr-system
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: hr-system-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hr-system-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hr-system-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hr-system-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hr-system-db
          property: password

databases:
  - name: hr-system-db
    plan: free
    databaseName: db_kpi
    user: hr_admin
